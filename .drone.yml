---
kind: pipeline
name: wirte-to-trenddb-amd64
type: docker

platform:
  os: linux
  arch: amd64

volumes:
  - name: docker
    host:
      path: /var/run/docker.sock

trigger:
  branch:
    - main
  event:
    - push
    - tag

steps:
  - name: push-amd64
    image: plugins/docker
    settings:
      registry: harbor.zkjgy.online
      repo: harbor.zkjgy.online/library/wirte-to-trenddb
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password
      tags:
        - linux-amd64
      dockerfile: Dockerfile
      context: .
    volumes:
      - name: docker
        path: /var/run/docker.sock

---
kind: pipeline
name: wirte-to-trenddb-arm64
type: docker

platform:
  os: linux
  arch: arm64

volumes:
  - name: docker
    host:
      path: /var/run/docker.sock

trigger:
  branch:
    - main
  event:
    - push
    - tag

steps:
  - name: push-arm64
    image: plugins/docker
    settings:
      registry: harbor.zkjgy.online
      repo: harbor.zkjgy.online/library/wirte-to-trenddb
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password
      tags:
        - linux-arm64
      dockerfile: Dockerfile
      context: .
    volumes:
      - name: docker
        path: /var/run/docker.sock

---
kind: pipeline
name: wirte-to-trenddb-manifest
type: docker

depends_on:
  - wirte-to-trenddb-amd64
  - wirte-to-trenddb-arm64

volumes:
  - name: docker
    host:
      path: /var/run/docker.sock

trigger:
  branch:
    - main
  event:
    - push
    - tag

steps:
  - name: manifest-latest
    image: plugins/manifest
    settings:
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password
      target: harbor.zkjgy.online/library/wirte-to-trenddb:latest
      template: harbor.zkjgy.online/library/wirte-to-trenddb:OS-ARCH
      platforms:
        - linux/amd64
        - linux/arm64
