name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - '**'

jobs:
  build-amd64:
    name: Build and Push amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: harbor.zkjgy.online/library/write-to-trenddb:linux-amd64

      - name: Save amd64 image as tar.gz
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker pull harbor.zkjgy.online/library/write-to-trenddb:linux-amd64
          docker save harbor.zkjgy.online/library/write-to-trenddb:linux-amd64 \
            | gzip > write-to-trenddb-amd64.tar.gz

      - name: Upload amd64 artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: write-to-trenddb-amd64
          path: write-to-trenddb-amd64.tar.gz

  build-arm64:
    name: Build and Push arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: harbor.zkjgy.online/library/write-to-trenddb:linux-arm64

      - name: Save arm64 image as tar.gz
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker pull --platform linux/arm64 harbor.zkjgy.online/library/write-to-trenddb:linux-arm64
          docker save harbor.zkjgy.online/library/write-to-trenddb:linux-arm64 \
            | gzip > write-to-trenddb-arm64.tar.gz

      - name: Upload arm64 artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: write-to-trenddb-arm64
          path: write-to-trenddb-arm64.tar.gz

  manifest:
    name: Create and Push Manifest
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and Push Manifest
        run: |
          docker buildx imagetools create \
            --tag harbor.zkjgy.online/library/write-to-trenddb:latest \
            harbor.zkjgy.online/library/write-to-trenddb:linux-amd64 \
            harbor.zkjgy.online/library/write-to-trenddb:linux-arm64

  helm-package-push:
    name: Helm Package and Push
    runs-on: ubuntu-latest
    needs:
      - manifest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm Login and Push
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          helm registry login harbor.zkjgy.online \
            --username $HARBOR_USERNAME \
            --password $HARBOR_PASSWORD
          helm package helm/write-to-trenddb --version 0.1.0
          helm push write-to-trenddb-0.1.0.tgz oci://harbor.zkjgy.online/library

      - name: Upload helm artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: write-to-trenddb-helm
          path: write-to-trenddb-0.1.0.tgz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - helm-package-push
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: write-to-trenddb-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: write-to-trenddb-arm64

      - name: Download helm artifact
        uses: actions/download-artifact@v4
        with:
          name: write-to-trenddb-helm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            write-to-trenddb-amd64.tar.gz
            write-to-trenddb-arm64.tar.gz
            write-to-trenddb-0.1.0.tgz
