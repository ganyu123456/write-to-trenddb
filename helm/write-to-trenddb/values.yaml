# ============================================================
# write-to-trenddb Helm Chart 默认配置
# ============================================================

# ── 镜像 ──────────────────────────────────────────────────
image:
  repository: harbor.zkjgy.online/library/write-to-trenddb
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: harbor-secret

# ── KubeEdge 边缘节点调度 ──────────────────────────────────
nodeName: cloudedge-edge-01
tolerations:
  - key: node-role.kubernetes.io/edge
    operator: Exists
    effect: NoSchedule

# hostNetwork 使服务可直接访问节点物理 IP（TrendDB5 / EMQX）
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

# ── 资源限制 ──────────────────────────────────────────────
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# ── appsettings.json 配置内容（渲染为 ConfigMap 挂载到容器）──
# 修改此处后执行 helm upgrade 即可，无需重建镜像
appSettings:
  Logging:
    LogLevel:
      Default: Information
      "Microsoft.Hosting.Lifetime": Information
      WriteToTrendDb: Information

  TrendDb5:
    # 支持多个数据库，逗号分隔多个 SERVER=...;DATABASE=...
    ConnectionString: "Type=TrendDB5;SERVER=127.0.0.1:20010;DATABASE=db01;UID=system;PWD=luculent123@,SERVER=127.0.0.1:20020;DATABASE=db02;UID=system;PWD=luculent123@"
    PoolSize: 7
    WriteIntervalSeconds: 5

  Mqtt:
    Broker: "192.168.122.231"
    Port: 1884
    ClientId: "trenddb-writer"
    Username: ""
    Password: ""
    # 订阅的 MQTT 主题列表（支持多个，对应多个 mapper 实例）
    Topics:
      - "sensors/batch"
      - "sensors2/batch"

  # 点表 CSV 文件在容器内的路径，由下方 pointsFile.hostPath 挂载到节点本地文件
  PointsFilePath: "/config/points.csv"

# ── 点表文件 hostPath 挂载 ────────────────────────────────
# 将边缘节点上的本地 CSV 文件直接挂载进容器，避免 ConfigMap 体积限制。
# 更新点表只需替换节点上的文件并重启 Pod，无需重新 helm upgrade。
pointsFile:
  # 边缘节点上的绝对路径（需提前将 points.csv 上传到该路径）
  hostPath: /opt/write-to-trenddb/config/points.csv
  # 容器内挂载路径（与 PointsFilePath 保持一致）
  mountPath: /config/points.csv
